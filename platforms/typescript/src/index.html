<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>JavaFranca</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        border: none;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      /* avoid wrapping div getting bigger than img or svg */
      img,
      svg {
        display: block;
      }
      html,
      body {
        width: 100vw;
        height: 100vh;
      }
      #app {
        position: static;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: row;
        align-items: stretch;
      }
      #graphics-router {
        flex: 1 1 0
      }
      #skia-router {
        flex: 1 1 0
      }
    </style>
  </head>
  <body class="bg-body">
    <div id="app">
      <div id="graphics-router"></div>
      <div id="skia-router"></div>
    </div>
  </body>
</html>
